---
services:
  opencloud:
    depends_on:
      drawio-init:
        condition: service_completed_successfully

  drawio-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_DRAWIO_TAG:-draw-io-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/draw-io /apps"]
