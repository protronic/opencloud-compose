---
services:
  opencloud:
    depends_on:
      progressbars-init:
        condition: service_completed_successfully

  progressbars-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_PROGRESSBARS_TAG:-progress-bars-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/progress-bars /apps"]
