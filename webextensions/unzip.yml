---
services:
  opencloud:
    depends_on:
      unzip-init:
        condition: service_completed_successfully

  unzip-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_UNZIP_TAG:-unzip-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/unzip /apps"]
