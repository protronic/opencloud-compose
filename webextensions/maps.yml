---
services:
  opencloud:
    depends_on:
      maps-init:
        condition: service_completed_successfully

  maps-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_MAPS_TAG:-maps-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/maps /apps"]
