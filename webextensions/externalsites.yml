---
services:
  opencloud:
    volumes:
      - ./config/opencloud/apps.yaml:/etc/opencloud/apps.yaml
    depends_on:
      externalsites-init:
        condition: service_completed_successfully

  externalsites-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_EXTERNALSITES_TAG:-external-sites-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/external-sites /apps"]
