---
services:
  opencloud:
    depends_on:
      calculator-init:
        condition: service_completed_successfully

  calculator-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_CALCULATOR_TAG:-calculator-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/calculator /apps"]
