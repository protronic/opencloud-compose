---
services:
  opencloud:
    depends_on:
      cast-init:
        condition: service_completed_successfully

  cast-init:
    image: ${WEB_EXTENSIONS_IMAGE:-opencloudeu/web-extensions}:${WEB_EXTENSION_CAST_TAG:-cast-latest}
    user: root
    volumes:
      - opencloud-apps:/apps
    entrypoint:
      - /bin/sh
    command: ["-c", "cp -R /web/apps/cast /apps"]
